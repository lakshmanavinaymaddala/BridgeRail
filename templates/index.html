<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailJourney MVP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .sugg-box { position: absolute; width: 100%; z-index: 1050; background: white; display: none; max-height: 200px; overflow-y: auto; border: 1px solid #ddd; }
        .sugg-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .sugg-item:hover { background: #f0f7ff; }
        .journey-card { background: white; border-radius: 12px; border-left: 6px solid #6c757d; margin-bottom: 25px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .journey-card.best { border-left-color: #198754; }
        .transfer-alert { background: #fff3cd; border: 1px dashed #ffc107; padding: 12px; border-radius: 8px; margin: 15px 0; font-size: 0.9rem; }
        .btn-stops { font-size: 0.7rem; padding: 2px 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-best { background: #198754; color: white; float: right; font-size: 0.7rem; padding: 5px 10px; border-radius: 20px; }
    </style>
</head>
<body class="p-3">
    <div class="container" style="max-width: 900px;">
        <div class="card p-4 shadow-sm border-0 mb-4 bg-white">
            <h3 class="text-center text-primary mb-4 fw-bold">Journey Planner</h3>
            <div class="row g-2">
                <div class="col-md-5 position-relative">
                    <input type="text" id="src" class="form-control form-control-lg" placeholder="Start Station" oninput="getSugg(this, 'src-sugg')">
                    <div id="src-sugg" class="sugg-box shadow rounded"></div>
                </div>
                <div class="col-md-5 position-relative">
                    <input type="text" id="dest" class="form-control form-control-lg" placeholder="End Station" oninput="getSugg(this, 'dest-sugg')">
                    <div id="dest-sugg" class="sugg-box shadow rounded"></div>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary btn-lg w-100 fw-bold" onclick="runSearch()">FIND</button>
                </div>
            </div>
        </div>

        <div id="loader" class="text-center my-5" style="display:none;">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
            <p class="text-muted mt-3 fw-bold">Calculating fastest connections...</p>
        </div>

        <div id="results">
            <div class="mb-5">
                <h5 class="fw-bold text-dark mb-3">Direct Trains</h5>
                <div class="table-responsive bg-white rounded shadow-sm"><table class="table align-middle m-0">
                    <thead class="table-light small"><tr><th>TRAIN</th><th>DEP</th><th>ARR</th></tr></thead>
                    <tbody id="d-body"></tbody>
                </table></div>
            </div>

            <h5 class="fw-bold text-dark mb-3">Multi-Train Connections</h5>
            <div id="i-container"></div>
        </div>
    </div>

    <div class="modal fade" id="stopsModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-scrollable"><div class="modal-content">
            <div class="modal-header border-0 pb-0"><h6 class="modal-title fw-bold">STATION LIST</h6><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body"><ul id="stops-list" class="list-group list-group-flush small"></ul></div>
        </div></div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function getSugg(el, boxId) {
    const q = el.value; const box = document.getElementById(boxId);
    if(q.length < 2) { box.style.display = 'none'; return; }
    const res = await fetch(`/autocomplete?q=${q}`);
    const data = await res.json();
    box.innerHTML = data.map(s => `<div class="sugg-item" onclick="setSt('${el.id}','${s['Station Code']}','${boxId}')"><b>${s['Station Code']}</b> - ${s['Station Name']}</div>`).join('');
    box.style.display = 'block';
}

function setSt(id, val, boxId) { document.getElementById(id).value = val; document.getElementById(boxId).style.display = 'none'; }

async function showStops(no, s, e) {
    const res = await fetch(`/get_stops?train_no=${no}&start_seq=${s}&end_seq=${e}`);
    const data = await res.json();
    document.getElementById('stops-list').innerHTML = data.map(st => `
        <li class="list-group-item d-flex justify-content-between px-0">
            <span>${st['Station Name']}</span>
            <span class="text-muted">${st['Arrival time'] == 'None' ? 'Origin' : st['Arrival time']}</span>
        </li>`).join('');
    new bootstrap.Modal(document.getElementById('stopsModal')).show();
}

async function runSearch() {
    document.getElementById('loader').style.display = 'block';
    document.getElementById('results').style.opacity = '0.3';
    const res = await fetch('/search', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({source: document.getElementById('src').value, destination: document.getElementById('dest').value})
    });
    const d = await res.json();
    document.getElementById('loader').style.display = 'none';
    document.getElementById('results').style.opacity = '1';

    document.getElementById('d-body').innerHTML = d.direct.length ? d.direct.map(t => `
        <tr><td><b>${t['Train No']}</b><br><small class="text-muted">${t['Train Name']}</small></td><td class="text-danger fw-bold">${t['Departure Time']}</td><td class="text-success fw-bold">${t['Arrival time']}</td></tr>
    `).join('') : '<tr><td colspan="3" class="text-center p-4 text-muted small">No direct trains found.</td></tr>';

    document.getElementById('i-container').innerHTML = d.indirect.length ? d.indirect.map(p => `
        <div class="journey-card ${p.best_value ? 'best' : ''}">
            ${p.best_value ? '<span class="badge-best">⭐ BEST VALUE</span>' : ''}
            <div>
                <span class="text-primary fw-bold small">PART 1:</span> <b>${p.leg1.no}</b><br>
                <small class="text-muted">${p.leg1.from} (${p.leg1.dep}) ➔ ${p.leg1.to} (${p.leg1.arr})</small><br>
                <button class="btn btn-outline-secondary btn-stops mt-2" onclick="showStops('${p.leg1.no}',${p.leg1.s_seq},${p.leg1.e_seq})">View Stops</button>
            </div>
            <div class="transfer-alert text-center fw-bold text-dark">
                WAIT AT ${p.junc} ➔ ${p.wait}
            </div>
            <div>
                <span class="text-success fw-bold small">PART 2:</span> <b>${p.leg2.no}</b><br>
                <small class="text-muted">${p.leg2.from} (${p.leg2.dep}) ➔ ${p.leg2.to} (${p.leg2.arr})</small><br>
                <button class="btn btn-outline-secondary btn-stops mt-2" onclick="showStops('${p.leg2.no}',${p.leg2.s_seq},${p.leg2.e_seq})">View Stops</button>
            </div>
        </div>
    `).join('') : '<p class="text-center text-muted small mt-4">Try different stations for connections.</p>';
}
</script>
</body>
</html>
